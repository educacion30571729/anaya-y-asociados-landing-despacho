<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Lic. Aurelio de la Cruz Anaya | Defensa Penal Estratégica | Anaya y Asociados</title>
    
    <meta name="description" content="Abogado Especialista en Derecho Penal con más de 18 años de experiencia. Ex Fiscal Especializado. Atención inmediata en emergencias, detenciones y amparos las 24 horas.">
    <meta name="keywords" content="abogado penalista, abogado penal ecatepec, defensa penal estratégica, detención ministerio público, amparo penal, delitos federales, juicios orales, anaya y asociados">
    <meta name="author" content="Lic. Aurelio de la Cruz Anaya">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta name="theme-color" content="#06101E">
    <link rel="canonical" href="https://educacion30571729.github.io/PAGINA-ANAYA-ASOCIADOS-1/">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Anaya y Asociados | Defensa Penal Estratégica">
    <meta property="og:description" content="Cuando más lo necesitas, la estrategia correcta puede cambiarlo todo. Más de 18 años de experiencia y respaldo institucional.">
    <meta property="og:image" content="assets/img/aurelio-anaya.webp">
    <meta property="og:locale" content="es_MX">
    <meta property="og:url" content="https://educacion30571729.github.io/PAGINA-ANAYA-ASOCIADOS-1/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        :root {
            --navy: #06101E;
            --navy-light: #09172B;
            --card-bg: #0C1E36;
            --gold: #C9A24D;
            --white: #FFFFFF;
            --text-gray: #A3B1C2;
            --border: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(201, 162, 77, 0.3);
            --shadow-sm: 0 5px 20px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 20px 60px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 35px 100px rgba(0, 0, 0, 0.6);
            --radius: 18px;
            --transition: .4s cubic-bezier(.4,.2,.2,1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--navy);
            color: var(--text-gray);
            overflow-x: hidden;
            line-height: 1.85;
            -webkit-font-smoothing: antialiased;
        }

        img {
            display: block;
            max-width: 100%;
        }

        .container {
            width: min(1220px, 92%);
            margin: auto;
        }

        /* Tipografía Editorial Serif para Títulos */
        h1, h2, h3, h4 {
            font-family: "Playfair Display", serif;
            font-weight: 700;
            color: var(--white);
            line-height: 1.25;
        }

        /* Justificación Editorial Universal en Escritorio */
        p {
            color: var(--text-gray);
            font-size: 17px;
            text-align: justify;
            text-justify: inter-word;
            word-spacing: -0.5px;
            hyphens: auto;
            line-height: 1.85;
        }

        /* Excepciones de centrado para simetría en encabezados de sección */
        .section-subtitle, .empathy-box p, .step-card p, .cta-final p, 
        .faq-header p, .map-header p, .testimonial-header p, .practice-header p, 
        .ecosystem-header p, .hero-trust p, .trust-item p {
            text-align: center;
        }

        section {
            padding: 110px 0;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .gold {
            color: var(--gold);
        }

        /* ===========================================================
             SISTEMA DE BOTONES CRO (TRÍADA DE ACCIÓN)
        =========================================================== */
        .btn-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            text-align: center;
        }

        /* Botón 1: WhatsApp (Oro) */
        .btn-gold {
            background: var(--gold);
            color: var(--navy);
            box-shadow: 0 10px 25px rgba(201, 162, 77, 0.3);
        }
        .btn-gold:hover {
            background: var(--white);
            color: var(--navy);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(201, 162, 77, 0.5);
        }

        /* Botón 2: Llamada (Azul Metálico Oscuro) */
        .btn-navy {
            background: #0D2444;
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-navy:hover {
            background: #15386A;
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        /* Botón 3: Agendar Consulta (Borde Oro) */
        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--white);
        }
        .btn-outline:hover {
            background: var(--gold);
            color: var(--navy);
            transform: translateY(-3px);
        }

        /* ===========================================================
             HEADER & NAVEGACIÓN FIJA
        =========================================================== */
        header {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            z-index: 9999;
            background: rgba(6, 16, 30, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            transition: .4s;
        }

        header.active {
            background: rgba(6, 16, 30, 0.98);
            box-shadow: var(--shadow-md);
        }

        .navbar {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            font-family: "Playfair Display", serif;
            color: var(--white);
            text-decoration: none;
            letter-spacing: .5px;
        }

        .logo span {
            color: var(--gold);
        }

        .menu {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .menu a {
            text-decoration: none;
            font-weight: 500;
            color: var(--white);
            transition: .3s;
            font-size: 15px;
        }

        .menu a:hover {
            color: var(--gold);
        }

        .contact-nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Botón Flotante con Efecto Latido de Urgencia */
        .whatsapp-floating {
            position: fixed;
            right: 28px;
            bottom: 28px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            color: white;
            text-decoration: none;
            box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.8);
            animation: latido-emergencia 1.8s infinite cubic-bezier(0.66, 0, 0, 1);
            z-index: 99999;
            transition: .35s;
        }

        .whatsapp-floating:hover {
            transform: scale(1.08);
            color: white;
        }

        @keyframes latido-emergencia {
            to { box-shadow: 0 0 0 25px rgba(37, 211, 102, 0); }
        }

        /* ===========================================================
             1. HERO SECTION (ENCABEZADO DE ALTA CONVERSIÓN)
        =========================================================== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding-top: 150px;
            padding-bottom: 80px;
            background: radial-gradient(circle at 80% 20%, rgba(201,162,77,.12), transparent 50%), var(--navy);
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 60px;
            align-items: center;
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            border-radius: 50px;
            background: rgba(201, 162, 77, 0.15);
            border: 1px solid var(--border-gold);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 25px;
        }

        .hero h1 {
            font-size: clamp(36px, 4.5vw, 62px);
            margin-bottom: 25px;
            line-height: 1.18;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 35px;
            max-width: 620px;
        }

        .hero-trust {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 25px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }

        .hero-trust div {
            font-size: 13px;
            font-weight: 600;
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .hero-trust i {
            color: var(--gold);
            font-size: 20px;
        }

        /* Foto Hero sin encimados en Escritorio */
        .hero-photo {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-photo img {
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-xl);
            object-fit: cover;
        }

        .hero-card {
            margin-top: 20px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 18px;
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 480px;
        }

        .hero-card h4 {
            font-size: 20px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .hero-card p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 0;
            text-align: left;
        }

        /* ===========================================================
             2. IDENTIFICACIÓN DEL PROBLEMA (EMPATÍA)
        =========================================================== */
        .empathy-section {
            background: var(--navy-light);
            padding: 90px 0;
        }

        .empathy-box {
            max-width: 900px;
            margin: auto;
            text-align: center;
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-md);
        }

        .empathy-box h2 {
            font-size: clamp(28px, 3.8vw, 44px);
            margin-bottom: 20px;
            color: var(--gold);
        }

        .empathy-box p {
            font-size: 19px;
            max-width: 780px;
            margin: 0 auto;
            line-height: 1.8;
            color: var(--white);
        }

        /* ===========================================================
             3. VIDEO & 4. MENSAJE EMPÁTICO
        =========================================================== */
        .video-empathy {
            background: var(--navy);
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .video-player {
            background: #000;
            padding: 10px;
            border-radius: 24px;
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-xl);
        }

        .video-player video {
            width: 100%;
            border-radius: 18px;
            display: block;
        }

        .empathy-list h2 {
            font-size: clamp(30px, 4vw, 48px);
            margin-bottom: 25px;
        }

        .empathy-points {
            list-style: none;
            margin-top: 25px;
        }

        .empathy-points li {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
            font-size: 16px;
            color: var(--text-gray);
        }

        .empathy-points i {
            color: var(--gold);
            font-size: 22px;
            margin-top: 3px;
        }

        /* ===========================================================
             5. SITUACIONES EN LAS QUE PODEMOS AYUDARTE
        =========================================================== */
        .practice {
            background: var(--navy-light);
        }

        .practice-header {
            text-align: center;
            max-width: 850px;
            margin: 0 auto 70px;
        }

        .practice-header small {
            display: block;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .practice-header h2 {
            font-size: clamp(30px, 4vw, 48px);
            margin-bottom: 15px;
        }

        .practice-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .practice-card {
            background: var(--card-bg);
            padding: 35px 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            transition: var(--transition);
        }

        .practice-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: var(--shadow-md);
        }

        .practice-icon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(201, 162, 77, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .practice-icon i {
            font-size: 28px;
            color: var(--gold);
        }

        .practice-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: var(--white);
        }

        .practice-card p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 0;
            text-align: center;
        }

        /* ===========================================================
             6. ¿POR QUÉ CONFIAR EN NOSOTROS? (AUTORIDAD + ECOSISTEMA)
        =========================================================== */
        .trust-section {
            background: var(--navy);
        }

        .trust-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 80px;
        }

        .trust-item {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .trust-item i {
            font-size: 32px;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .trust-item h4 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .trust-item p {
            font-size: 14px;
            line-height: 1.5;
            text-align: center;
            margin-bottom: 0;
        }

        /* Ecosistema 3 Firmas */
        .ecosystem-container {
            margin-top: 60px;
            border-top: 1px solid var(--border);
            padding-top: 70px;
        }

        .ecosystem-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .ecosystem-card {
            background: #040B14;
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo-box {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .logo-box img {
            max-height: 70px;
            max-width: 100%;
            object-fit: contain;
        }

        .ecosystem-card h3 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 15px;
        }

        .ecosystem-card ul {
            list-style: none;
            margin: 20px 0 30px;
        }

        .ecosystem-card li {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
            font-size: 15px;
        }

        .ecosystem-card li i {
            color: var(--gold);
            margin-top: 4px;
        }

        /* ===========================================================
             7. ASÍ TRABAJAMOS (PROCESO EN 4 PASOS)
        =========================================================== */
        .process-section {
            background: var(--navy-light);
        }

        .process-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            position: relative;
        }

        .step-card {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 22px;
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
        }

        .step-number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gold);
            color: var(--navy);
            font-weight: 800;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .step-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .step-card p {
            font-size: 15px;
            text-align: center;
            margin-bottom: 0;
        }

        /* ===========================================================
             8. OPINIONES DE CLIENTES
        =========================================================== */
        .testimonials {
            background: var(--navy);
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .testimonial {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .stars {
            color: #F5C542;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .testimonial p {
            font-style: italic;
            margin-bottom: 25px;
        }

        .client-info strong {
            display: block;
            color: var(--white);
        }

        .client-info span {
            font-size: 13px;
            color: var(--gold);
        }

        /* ===========================================================
             9. PREGUNTAS FRECUENTES (FAQ)
        =========================================================== */
        .faq {
            background: var(--navy-light);
        }

        .faq-container {
            max-width: 880px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .faq-item {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: .3s;
        }

        .faq-question {
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            color: var(--white);
        }

        .faq-question i {
            color: var(--gold);
            transition: .3s;
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height .4s ease;
        }

        .faq-answer p {
            padding: 0 30px 25px;
            margin-bottom: 0;
            text-align: left;
        }

        .faq-item.active {
            border-color: var(--gold);
        }

        .faq-item.active .faq-answer {
            max-height: 300px;
        }

        .faq-item.active i {
            transform: rotate(180deg);
        }

        /* ===========================================================
             10. LLAMADO FINAL A LA ACCIÓN & CONTACTO
        =========================================================== */
        .cta-final {
            padding: 100px 0;
            background: linear-gradient(135deg, #040B14, #0C1E36);
            border-top: 1px solid var(--border-gold);
            text-align: center;
        }

        .cta-final h2 {
            font-size: clamp(34px, 4.5vw, 54px);
            margin-bottom: 20px;
        }

        .cta-final p {
            max-width: 750px;
            margin: 0 auto 40px;
            font-size: 19px;
            text-align: center;
        }

        /* Contacto Directo y Mapa */
        .contact-section {
            background: var(--navy);
            padding: 80px 0 0;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            padding-bottom: 80px;
        }

        .contact-box {
            display: flex;
            gap: 20px;
            padding: 25px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            margin-bottom: 20px;
        }

        .contact-box i {
            font-size: 26px;
            color: var(--gold);
        }

        .contact-box strong {
            color: var(--white);
            display: block;
            margin-bottom: 4px;
        }

        .map-wrapper {
            height: 450px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-gold);
            box-shadow: var(--shadow-xl);
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: grayscale(80%) invert(90%) contrast(85%);
        }

        /* Footer */
        footer {
            background: #030810;
            padding: 60px 0 40px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 14px;
        }

        /* ===========================================================
             SISTEMA CRO RESPONSIVE: TARJETA COMPACTA EN MÓVIL
        =========================================================== */
        @media(max-width: 1100px) {
            .hero-grid, .video-grid, .contact-grid {
                grid-template-columns: 1fr;
                gap: 50px;
            }
            .practice-grid, .trust-grid, .process-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .ecosystem-grid, .testimonial-grid {
                grid-template-columns: 1fr;
            }
            .hero-trust {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width: 992px) {
            .menu {
                display: none;
            }
        }

        @media(max-width: 768px) {
            section {
                padding: 75px 0;
            }
            .hero {
                padding-top: 105px !important;
                padding-bottom: 50px !important;
                min-height: auto !important;
            }
            /* MAGIA CRO: Inversión de orden. La foto sube al #1 en el móvil */
            .hero-grid {
                display: flex !important;
                flex-direction: column !important;
                gap: 20px !important;
            }
            .hero-photo {
                order: -1 !important; /* Coloca tu foto y cargo justo arriba en celular */
                width: 100% !important;
                margin-bottom: 10px !important;
            }
            .hero-photo img {
                width: 100% !important;
                height: 250px !important; /* Altura ejecutiva compacta */
                object-fit: cover !important;
                object-position: top center !important; /* Enfoque en tu rostro y traje */
                border-radius: 20px !important;
                box-shadow: var(--shadow-xl) !important;
            }
            .hero-card {
